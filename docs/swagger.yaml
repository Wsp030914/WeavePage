definitions:
  handler.AddMemberReq:
    properties:
      email:
        type: string
      role:
        enum:
        - editor
        - viewer
        type: string
    required:
    - email
    - role
    type: object
  handler.CreateProjectReq:
    properties:
      color:
        type: string
      name:
        maxLength: 128
        minLength: 1
        type: string
    required:
    - name
    type: object
  handler.CreateTaskReq:
    properties:
      content_md:
        type: string
      due_at:
        type: string
      priority:
        type: integer
      project_id:
        type: integer
      status:
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - project_id
    - title
    type: object
  handler.DueCallbackReq:
    properties:
      task_id:
        minimum: 1
        type: integer
      triggered_at:
        type: string
    required:
    - task_id
    type: object
  handler.LoginReq:
    properties:
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 64
        minLength: 2
        type: string
    required:
    - password
    - username
    type: object
  handler.RemoveMemberReq:
    properties:
      user_id:
        type: integer
    required:
    - user_id
    type: object
  handler.UpdateProjectReq:
    properties:
      color:
        type: string
      name:
        type: string
      sort_order:
        type: integer
    type: object
  handler.UpdateTaskReq:
    properties:
      content_md:
        type: string
      due_at:
        type: string
      priority:
        type: integer
      project_id:
        type: integer
      sort_order:
        type: integer
      status:
        type: string
      title:
        type: string
    type: object
  models.Project:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.Task:
    properties:
      content_md:
        type: string
      created_at:
        type: string
      due_at:
        type: string
      id:
        type: integer
      notified:
        type: boolean
      priority:
        type: integer
      project_id:
        type: integer
      sort_order:
        type: integer
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      timezone:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  response.PageResult:
    properties:
      list: {}
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  response.Resp:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.TaskListResult:
    properties:
      tasks:
        items:
          $ref: '#/definitions/models.Task'
        type: array
      total:
        format: int64
        type: integer
    type: object
info:
  contact: {}
paths:
  /internal/due_callback:
    post:
      consumes:
      - application/json
      description: 内部调度器回调接口，用于触发任务到期通知
      parameters:
      - description: 调度令牌
        in: header
        name: X-Scheduler-Token
        required: true
        type: string
      - description: 回调信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.DueCallbackReq'
      produces:
      - application/json
      responses:
        "200":
          description: 回调处理成功
          schema:
            $ref: '#/definitions/response.Resp'
        "401":
          description: 令牌无效
          schema:
            $ref: '#/definitions/response.Resp'
      summary: 任务到期回调
      tags:
      - Internal
  /login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录
      parameters:
      - description: 登录信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Resp'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/response.Resp'
      summary: 用户登录
      tags:
      - User
  /logout:
    post:
      consumes:
      - application/json
      description: 注销当前用户的登录状态
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            $ref: '#/definitions/response.Resp'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 退出登录
      tags:
      - User
  /projects:
    get:
      consumes:
      - application/json
      description: 获取项目列表，支持按名称搜索
      parameters:
      - description: 项目名称
        in: query
        name: name
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/response.PageResult'
              type: object
      security:
      - BearerAuth: []
      summary: 项目列表/搜索
      tags:
      - Project
    post:
      consumes:
      - application/json
      description: 创建新的项目
      parameters:
      - description: 项目信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.CreateProjectReq'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.Project'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Resp'
        "409":
          description: 项目已存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 创建项目
      tags:
      - Project
  /projects/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定项目及其关联任务
      parameters:
      - description: 项目ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: 项目不存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 删除项目
      tags:
      - Project
    get:
      consumes:
      - application/json
      description: 根据ID获取项目信息
      parameters:
      - description: 项目ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.Project'
              type: object
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: 项目不存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 获取项目详情
      tags:
      - Project
    patch:
      consumes:
      - application/json
      description: 更新项目信息（名称、颜色等）
      parameters:
      - description: 项目ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateProjectReq'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: 项目不存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 更新项目
      tags:
      - Project
  /projects/{id}/tasks/{task_id}:
    patch:
      consumes:
      - application/json
      description: 更新任务详情（标题、内容、状态、优先级等）
      parameters:
      - description: 项目ID
        in: path
        name: id
        required: true
        type: integer
      - description: 任务ID
        in: path
        name: task_id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateTaskReq'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/response.Resp'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: 任务不存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 更新任务
      tags:
      - Task
  /projects/{id}/tasks/{task_id}/members:
    delete:
      consumes:
      - application/json
      description: 移除任务成员
      parameters:
      - description: 项目ID
        in: path
        name: id
        required: true
        type: integer
      - description: 任务ID
        in: path
        name: task_id
        required: true
        type: integer
      - description: 成员ID
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.RemoveMemberReq'
      produces:
      - application/json
      responses:
        "200":
          description: 移除成功
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 移除任务成员
      tags:
      - Task
    post:
      consumes:
      - application/json
      description: 邀请用户参与任务
      parameters:
      - description: 项目ID
        in: path
        name: id
        required: true
        type: integer
      - description: 任务ID
        in: path
        name: task_id
        required: true
        type: integer
      - description: 成员信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.AddMemberReq'
      produces:
      - application/json
      responses:
        "200":
          description: 添加成功
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 添加任务成员
      tags:
      - Task
  /register:
    post:
      consumes:
      - multipart/form-data
      description: 注册新用户，支持头像上传
      parameters:
      - description: 邮箱
        in: formData
        name: email
        required: true
        type: string
      - description: 用户名
        in: formData
        name: username
        required: true
        type: string
      - description: 密码
        in: formData
        name: password
        required: true
        type: string
      - description: 确认密码
        in: formData
        name: confirm_password
        required: true
        type: string
      - description: 头像文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Resp'
        "409":
          description: 用户名或邮箱已存在
          schema:
            $ref: '#/definitions/response.Resp'
      summary: 用户注册
      tags:
      - User
  /tasks:
    get:
      consumes:
      - application/json
      description: 获取指定项目的任务列表
      parameters:
      - description: 项目ID
        in: query
        name: project_id
        required: true
        type: integer
      - description: 任务状态 (todo/done)
        in: query
        name: status
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/response.PageResult'
              type: object
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 任务列表
      tags:
      - Task
    post:
      consumes:
      - application/json
      description: 在指定项目中创建新任务
      parameters:
      - description: 任务信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.CreateTaskReq'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.Task'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 创建任务
      tags:
      - Task
  /tasks/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定任务
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: 任务不存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 删除任务
      tags:
      - Task
    get:
      consumes:
      - application/json
      description: 获取单个任务的详细信息
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.Task'
              type: object
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: 任务不存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 查询任务详情
      tags:
      - Task
  /tasks/me:
    get:
      consumes:
      - application/json
      description: 获取当前用户参与的所有任务
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/service.TaskListResult'
              type: object
      security:
      - BearerAuth: []
      summary: 查看我参与的任务
      tags:
      - Task
  /users/me:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - User
    patch:
      consumes:
      - multipart/form-data
      description: 更新当前用户的个人信息（头像、用户名、密码等）
      parameters:
      - description: 邮箱
        in: formData
        name: email
        type: string
      - description: 用户名
        in: formData
        name: username
        type: string
      - description: 密码
        in: formData
        name: password
        type: string
      - description: 确认密码
        in: formData
        name: confirm_password
        type: string
      - description: 头像文件
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Resp'
        "409":
          description: 用户名或邮箱已存在
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 更新用户信息
      tags:
      - User
swagger: "2.0"
