definitions:
  handler.AddMemberReq:
    properties:
      email:
        type: string
      role:
        enum:
        - editor
        - viewer
        type: string
    required:
    - email
    - role
    type: object
  handler.CompleteDocumentImportReq:
    properties:
      title:
        type: string
    type: object
  handler.CreateDocumentImportReq:
    properties:
      chunk_size:
        type: integer
      collaboration_mode:
        type: string
      file_name:
        type: string
      project_id:
        type: integer
      sha256:
        type: string
      title:
        type: string
      total_parts:
        type: integer
      total_size:
        type: integer
    required:
    - file_name
    - project_id
    - total_size
    type: object
  handler.CreateMeetingActionTodoReq:
    properties:
      due_at:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  handler.CreateMeetingReq:
    properties:
      project_id:
        type: integer
      title:
        type: string
    type: object
  handler.CreateProjectReq:
    properties:
      color:
        type: string
      name:
        maxLength: 128
        minLength: 1
        type: string
    required:
    - name
    type: object
  handler.CreateTaskCommentReq:
    properties:
      anchor_text:
        type: string
      anchor_type:
        type: string
      content_md:
        type: string
    required:
    - content_md
    type: object
  handler.CreateTaskReq:
    properties:
      collaboration_mode:
        type: string
      content_md:
        type: string
      doc_type:
        type: string
      due_at:
        type: string
      priority:
        type: integer
      project_id:
        type: integer
      status:
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - project_id
    - title
    type: object
  handler.DueCallbackReq:
    properties:
      task_id:
        minimum: 1
        type: integer
      triggered_at:
        type: string
    required:
    - task_id
    type: object
  handler.LoginReq:
    properties:
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 64
        minLength: 2
        type: string
    required:
    - password
    - username
    type: object
  handler.RealtimeMetricsResponse:
    properties:
      collected_at:
        type: string
      content:
        $ref: '#/definitions/realtime.HubMetrics'
      project:
        $ref: '#/definitions/realtime.HubMetrics'
    type: object
  handler.RemoveMemberReq:
    properties:
      user_id:
        type: integer
    required:
    - user_id
    type: object
  handler.SaveDocumentContentReq:
    properties:
      content_md:
        type: string
      expected_version:
        type: integer
    required:
    - content_md
    - expected_version
    type: object
  handler.UpdateProjectReq:
    properties:
      color:
        type: string
      name:
        type: string
      sort_order:
        type: integer
    type: object
  handler.UpdateTaskCommentReq:
    properties:
      resolved:
        type: boolean
    type: object
  handler.UpdateTaskReq:
    properties:
      clear_due_at:
        type: boolean
      content_md:
        type: string
      due_at:
        type: string
      expected_version:
        type: integer
      priority:
        type: integer
      project_id:
        type: integer
      sort_order:
        type: integer
      status:
        type: string
      title:
        type: string
    type: object
  models.Project:
    properties:
      color:
        type: string
      created_at:
        type: string
      deleted_at:
        format: date-time
        type: string
      deleted_by:
        type: integer
      deleted_name:
        type: string
      id:
        type: integer
      name:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.Task:
    properties:
      collaboration_mode:
        type: string
      content_md:
        type: string
      created_at:
        type: string
      deleted_at:
        format: date-time
        type: string
      deleted_by:
        type: integer
      deleted_title:
        type: string
      doc_type:
        type: string
      due_at:
        type: string
      id:
        type: integer
      members:
        items:
          $ref: '#/definitions/models.TaskMemberInfo'
        type: array
      notified:
        type: boolean
      priority:
        type: integer
      project_id:
        type: integer
      sort_order:
        type: integer
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
      version:
        type: integer
    type: object
  models.TaskCommentInfo:
    properties:
      anchor_text:
        type: string
      anchor_type:
        type: string
      content_md:
        type: string
      created_at:
        type: string
      id:
        type: integer
      project_id:
        type: integer
      resolved:
        type: boolean
      resolved_at:
        type: string
      resolved_by:
        type: integer
      task_id:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.UserInfo'
      user_id:
        type: integer
    type: object
  models.TaskEvent:
    properties:
      actor_id:
        type: integer
      created_at:
        type: string
      event_id:
        type: string
      event_type:
        type: string
      id:
        type: integer
      payload:
        type: object
      project_id:
        type: integer
      task_id:
        type: integer
      task_version:
        type: integer
    type: object
  models.TaskMemberInfo:
    properties:
      joined_at:
        type: string
      role:
        type: string
      user:
        $ref: '#/definitions/models.UserInfo'
      user_id:
        type: integer
    type: object
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      timezone:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserInfo:
    properties:
      avatar_url:
        type: string
      username:
        type: string
    type: object
  realtime.HubMetrics:
    properties:
      active_connections:
        type: integer
      active_rooms:
        type: integer
      active_users:
        type: integer
      counters:
        $ref: '#/definitions/realtime.RealtimeCounters'
      hub:
        type: string
      node_id:
        type: string
      rooms:
        items:
          $ref: '#/definitions/realtime.RoomMetrics'
        type: array
    type: object
  realtime.RealtimeCounters:
    properties:
      broadcast_messages:
        type: integer
      connections_accepted:
        type: integer
      connections_closed:
        type: integer
      content_updates:
        type: integer
      dropped_clients:
        type: integer
      duplicate_updates:
        type: integer
      lock_errors:
        type: integer
      lock_requests:
        type: integer
      pubsub_publish_errors:
        type: integer
      pubsub_published:
        type: integer
      pubsub_received:
        type: integer
    type: object
  realtime.RoomMetrics:
    properties:
      connections:
        type: integer
      id:
        type: integer
      users:
        type: integer
    type: object
  response.PageResult:
    properties:
      list: {}
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  response.Resp:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.DiaryTodayResult:
    properties:
      project:
        $ref: '#/definitions/models.Project'
      task:
        $ref: '#/definitions/models.Task'
    type: object
  service.DocumentImportAssetResult:
    properties:
      markdown:
        type: string
      original_path:
        type: string
      upload_id:
        type: string
      url:
        type: string
    type: object
  service.DocumentImportCompleteResult:
    properties:
      assets:
        items:
          $ref: '#/definitions/service.DocumentImportAssetResult'
        type: array
      stats:
        $ref: '#/definitions/service.DocumentImportCompletionStats'
      task:
        $ref: '#/definitions/models.Task'
    type: object
  service.DocumentImportCompletionStats:
    properties:
      rewritten_links:
        type: integer
      size_bytes:
        type: integer
    type: object
  service.DocumentImportPartResult:
    properties:
      part_no:
        type: integer
      received_parts:
        type: integer
      sha256:
        type: string
      size:
        type: integer
      total_parts:
        type: integer
      upload_id:
        type: string
      uploaded_at:
        type: string
    type: object
  service.DocumentImportSessionResult:
    properties:
      chunk_size:
        type: integer
      collaboration_mode:
        type: string
      expires_at:
        type: string
      file_name:
        type: string
      project_id:
        type: integer
      title:
        type: string
      total_parts:
        type: integer
      total_size:
        type: integer
      upload_id:
        type: string
    type: object
  service.MeetingCreateResult:
    properties:
      project:
        $ref: '#/definitions/models.Project'
      task:
        $ref: '#/definitions/models.Task'
    type: object
  service.ProjectActivityResult:
    properties:
      activities:
        items:
          $ref: '#/definitions/service.TaskActivityEntry'
        type: array
      has_more:
        type: boolean
      next_cursor:
        type: integer
    type: object
  service.ProjectSyncResult:
    properties:
      events:
        items:
          $ref: '#/definitions/models.TaskEvent'
        type: array
      has_more:
        type: boolean
      next_cursor:
        type: integer
    type: object
  service.TaskActivityEntry:
    properties:
      activity_type:
        type: string
      actor_id:
        type: integer
      created_at:
        type: string
      event_id:
        type: string
      event_type:
        type: string
      id:
        type: integer
      project_id:
        type: integer
      summary:
        type: string
      task:
        $ref: '#/definitions/models.Task'
      task_id:
        type: integer
      task_version:
        type: integer
    type: object
  service.TaskListResult:
    properties:
      tasks:
        items:
          $ref: '#/definitions/models.Task'
        type: array
      total:
        format: int64
        type: integer
    type: object
  service.TrashRestoreResult:
    properties:
      task:
        $ref: '#/definitions/models.Task'
    type: object
  service.WorkspaceSearchResult:
    properties:
      documents:
        items:
          $ref: '#/definitions/models.Task'
        type: array
      spaces:
        items:
          $ref: '#/definitions/models.Project'
        type: array
    type: object
info:
  contact: {}
paths:
  /api/internal/scheduler/task-due:
    post:
      consumes:
      - application/json
      description: 调度器内部回调接口，用于触发任务到期通知
      parameters:
      - description: 调度令牌
        in: header
        name: X-Scheduler-Token
        required: true
        type: string
      - description: 回调信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.DueCallbackReq'
      produces:
      - application/json
      responses:
        "200":
          description: 回调处理成功
          schema:
            $ref: '#/definitions/response.Resp'
        "401":
          description: 令牌无效
          schema:
            $ref: '#/definitions/response.Resp'
      summary: 任务到期回调
      tags:
      - Internal
  /comments/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a comment. The author and document owners/editors can delete
        comments.
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Deleted
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Comment not found
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Delete a comment
      tags:
      - Comment
    patch:
      consumes:
      - application/json
      description: Updates comment state such as resolved/unresolved. Authors and
        document owners/editors can resolve comments.
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Comment patch
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateTaskCommentReq'
      produces:
      - application/json
      responses:
        "200":
          description: Updated
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.TaskCommentInfo'
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Comment not found
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Update a comment state
      tags:
      - Comment
  /diary/{date}:
    post:
      consumes:
      - application/json
      description: 查找或创建当前用户指定日期 YYYY-MM-DD.md 私人文档。
      parameters:
      - description: YYYY-MM-DD
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 打开成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/service.DiaryTodayResult'
              type: object
      security:
      - BearerAuth: []
      summary: 打开或创建指定日期日记
      tags:
      - Diary
  /diary/today:
    post:
      consumes:
      - application/json
      description: 查找或创建当前用户的“日记”空间，并打开当天 YYYY-MM-DD.md 私人文档。
      produces:
      - application/json
      responses:
        "200":
          description: 打开成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/service.DiaryTodayResult'
              type: object
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Resp'
        "500":
          description: 系统错误
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: 打开或创建今日日记
      tags:
      - Diary
  /documents/{id}/comments:
    get:
      consumes:
      - application/json
      description: Returns document-level comments for a document, meeting note, or
        todo. Diary documents are rejected.
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Comments
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.TaskCommentInfo'
                  type: array
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Document not found
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: List document comments
      tags:
      - Comment
    post:
      consumes:
      - application/json
      description: Creates a document-level comment for a document, meeting note,
        or todo. Diary documents are rejected.
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: integer
      - description: Comment payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.CreateTaskCommentReq'
      produces:
      - application/json
      responses:
        "200":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.TaskCommentInfo'
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Document not found
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Create a document comment
      tags:
      - Comment
  /documents/{id}/content:
    patch:
      consumes:
      - application/json
      description: Saves plain Markdown content for diary documents. Only the owner
        can save, and this does not write the Yjs update log.
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: integer
      - description: Content payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.SaveDocumentContentReq'
      produces:
      - application/json
      responses:
        "200":
          description: Saved
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/models.Task'
              type: object
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Document not found
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Save plain Markdown document content
      tags:
      - Document
  /documents/imports:
    post:
      consumes:
      - application/json
      description: Creates a resumable Markdown import session. Use collaboration_mode=collaborative
        for shared docs or private for private docs.
      parameters:
      - description: Import metadata
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.CreateDocumentImportReq'
      produces:
      - application/json
      responses:
        "200":
          description: Session created
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/service.DocumentImportSessionResult'
              type: object
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: Permission denied
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Create Markdown document import session
      tags:
      - DocumentImport
  /documents/imports/{upload_id}:
    delete:
      consumes:
      - application/json
      description: Deletes temporary uploaded chunks and assets for an unfinished
        import session.
      parameters:
      - description: Upload session id
        in: path
        name: upload_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Import aborted
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: Permission denied
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Abort Markdown document import
      tags:
      - DocumentImport
  /documents/imports/{upload_id}/assets:
    post:
      consumes:
      - multipart/form-data
      description: Uploads an image asset referenced by the Markdown file and records
        its original relative path for link rewriting.
      parameters:
      - description: Upload session id
        in: path
        name: upload_id
        required: true
        type: string
      - description: Original relative path in Markdown, such as images/a.png
        in: formData
        name: original_path
        type: string
      - description: Image file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Asset uploaded
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/service.DocumentImportAssetResult'
              type: object
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: Permission denied
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Upload Markdown referenced image
      tags:
      - DocumentImport
  /documents/imports/{upload_id}/complete:
    post:
      consumes:
      - application/json
      description: Assembles uploaded chunks, rewrites local image references to uploaded
        asset URLs, and creates a document.
      parameters:
      - description: Upload session id
        in: path
        name: upload_id
        required: true
        type: string
      - description: Optional completion data
        in: body
        name: req
        schema:
          $ref: '#/definitions/handler.CompleteDocumentImportReq'
      produces:
      - application/json
      responses:
        "200":
          description: Document imported
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/service.DocumentImportCompleteResult'
              type: object
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: Permission denied
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/response.Resp'
        "409":
          description: Upload incomplete or digest mismatch
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Complete Markdown document import
      tags:
      - DocumentImport
  /documents/imports/{upload_id}/parts/{part_no}:
    put:
      consumes:
      - application/octet-stream
      description: Uploads one raw binary Markdown chunk for a resumable import session.
      parameters:
      - description: Upload session id
        in: path
        name: upload_id
        required: true
        type: string
      - description: 1-based part number
        in: path
        name: part_no
        required: true
        type: integer
      - description: Raw chunk bytes
        in: body
        name: file
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: Part uploaded
          schema:
            allOf:
            - $ref: '#/definitions/response.Resp'
            - properties:
                data:
                  $ref: '#/definitions/service.DocumentImportPartResult'
              type: object
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/response.Resp'
        "403":
          description: Permission denied
          schema:
            $ref: '#/definitions/response.Resp'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/response.Resp'
        "409":
          description: Session busy or incomplete
          schema:
            $ref: '#/definitions/response.Resp'
      security:
      - BearerAuth: []
      summary: Upload Markdown import chunk
      tags:
      - DocumentImport
  /login:
    post:
      consumes:
      - application/json
      description: 使用用户名或邮箱和密码登录
      parameters:
      - description: 登录信息
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handler.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
